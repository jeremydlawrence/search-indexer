server:
  port: 8080

spring:
  application:
    name: SearchIndexer

open-search:
  protocol: http
  host: localhost
  port: 9200

indexing:
  product:
    index-name: products
    alias: products
    old-alias: old
    old-index-keep-days: 1
    batch-size: 500
    replicas: 0
    refresh-seconds: 1
    status-wait-seconds: 30
    settings: /products-settings.json
    mapping: /products-mapping.json

logging:
  level:
    org.example: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method